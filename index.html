<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Glyph Dither — DIY (no Unicorn)</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font: 12px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif; color: #ddd; }
    body { display: grid; place-items: center; }

    /* Square stage, scales to fit viewport */
    .stage { aspect-ratio: 1 / 1; width: min(100vw, 100vh, 1080px); height: min(100vw, 100vh, 1080px); position: relative; }
    #gl { width: 100%; height: 100%; display: block; }

    /* Top-left video controls bar */
    .top {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      display: flex; gap: 6px; align-items: center;
      background: rgba(20,20,24,.72); backdrop-filter: blur(6px);
      padding: 8px 10px; border-radius: 8px; border: 1px solid #2a2a30;
    }
    .top button, .top label.btn {
      background: #2D4DFF; color: white; border: 0; padding: 6px 10px; border-radius: 6px;
      cursor: pointer; font: inherit;
    }
    .top button.ghost, .top label.btn.ghost { background: #2a2a30; color: #ddd; }
    .top input[type="url"] {
      background: #1a1a1f; color: #ddd; border: 1px solid #2a2a30; padding: 6px 8px; border-radius: 6px;
      width: 320px; font: inherit;
    }
    .top .hint { color: #888; margin-left: 6px; }
    #fileInput { display: none; }

    /* Drag overlay */
    .drop {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(45, 77, 255, .15); border: 3px dashed #2D4DFF; z-index: 20;
      font-size: 24px; font-weight: 600; color: #fff;
    }
    .drop.show { display: flex; }

    /* Tap-to-play overlay if browser blocks autoplay */
    .play {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.6); z-index: 30; cursor: pointer; color: #fff; font-size: 18px;
    }
    .play.show { display: flex; }

    /* lil-gui restyle wrapper */
    .lil-gui.root { --background-color: rgba(20,20,24,.85); --widget-color: #2a2a30; --hover-color: #3a3a44; --focus-color: #2D4DFF; }
  </style>
</head>
<body>
  <div class="stage">
    <canvas id="gl"></canvas>
  </div>

  <div class="top">
    <label class="btn">Choose video<input type="file" id="fileInput" accept="video/*"></label>
    <input type="url" id="urlInput" placeholder="Paste a video URL and press Enter">
    <button id="urlLoad" class="ghost">Load</button>
    <span class="hint">…or drop a video anywhere</span>
  </div>

  <div class="drop" id="drop">Drop video to load</div>
  <div class="play" id="play">Click to play</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.js"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
