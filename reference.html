<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Butterfly Effect — Unicorn Studio</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    body {
      display: grid;
      place-items: center;
    }
    /* 正方形舞台：在大屏上接近 1080×1080，在小屏上等比缩到能放下的最大正方形。 */
    .stage {
      aspect-ratio: 1 / 1;
      width: min(100vw, 100vh, 1080px);
      height: min(100vw, 100vh, 1080px);
    }
    .stage > [data-us-project] {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <noscript>This effect needs JavaScript enabled.</noscript>

  <div class="stage">
    <div data-us-project="JzfOHYS6A3UZlKNk95Ac"></div>
  </div>

  <script type="text/javascript">!function(){var u=window.UnicornStudio;if(u&&u.init){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){u.init()})}else{u.init()}}else{window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.12/dist/unicornStudio.umd.js",i.onload=function(){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){UnicornStudio.init()})}else{UnicornStudio.init()}},(document.head||document.body).appendChild(i)}}();</script>
</body>
</html>
